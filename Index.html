// FIX 3: SHA-256 password hashing via browser SubtleCrypto API
async function hashPass(password) {
  const buf     = new TextEncoder().encode(password);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

            <span style={{cursor:"pointer",color:"#60a5fa"}} onClick={()=>nav("login")}>{t("signIn")}</span>
            <span style={{opacity:0.3}}>|</span>
            <span style={{cursor:"pointer",color:"#4ade80"}} onClick={()=>nav("signup")}>{t("joinPortal")}</span>
          </>}
          {user && !user.admin && <>
            <span style={{color:"#60a5fa",cursor:"pointer"}} onClick={()=>nav("profile")}>⚡ {user.name?.split(" ")[0]}</span>
            <span style={{opacity:0.3}}>|</span>
            <span style={{cursor:"pointer",color:"#f87171"}} onClick={logout}>{t("logout")}</span>
          </>}
          {user?.admin && <>
            <span style={{color:"#4ade80",cursor:"pointer"}} onClick={()=>nav("admin")}>👑 Central Admin</span>
            <span style={{opacity:0.3}}>|</span>
            <span style={{cursor:"pointer",color:"#f87171"}} onClick={logout}>{t("logout")}</span>
          </>}
        </div>
      </div>

      {/* Header */}
      <header style={{background:C_CARD,borderBottom:`1px solid ${C_BDR}`,padding:"0 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between",minHeight:70,position:"sticky",top:0,zIndex:50,flexWrap:"wrap",gap:10,width:"100%"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",padding:"5px 0"}} onClick={()=>nav("home")}>
          <div style={{width:44,height:44,background:`linear-gradient(135deg,${P},#1d4ed8)`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem",color:"#fff"}}>🎓</div>
          <div>
            <div style={{fontWeight:800,fontSize:"1rem",color:darkMode?"#60a5fa":"#1e3a8a"}}>{settings.siteName || "BTU PORTAL"}</div>
            <div style={{fontWeight:700,fontSize:"0.75rem",color:SEC,letterSpacing:"1px"}}>UNIVERSITY ECOSYSTEM</div>
          </div>
        </div>
        <nav style={{display:"flex",gap:"1rem",fontWeight:700,fontSize:"0.85rem",flexWrap:"wrap",padding:"5px 0",alignItems:"center"}}>
          <span onClick={()=>nav("home")}         style={{cursor:"pointer",color:page==="home"?"#2563eb":C_MUT}}>{t("home")}</span>
          <span onClick={()=>nav("events")}        style={{cursor:"pointer",color:page==="events"?"#2563eb":C_MUT}}>{t("events")}</span>
          <span onClick={()=>nav("notes")}         style={{cursor:"pointer",color:page==="notes"?"#2563eb":C_MUT}}>{t("notes")}</span>
          <span onClick={()=>nav("gallery")}       style={{cursor:"pointer",color:page==="gallery"?"#e11d48":C_MUT}}>{t("gallery")}</span>
          <span onClick={()=>nav("timetable")}     style={{cursor:"pointer",color:page==="timetable"?"#7c3aed":C_MUT}}>{t("timetable")}</span>
          <span onClick={()=>nav("achievements")}  style={{cursor:"pointer",color:page==="achievements"?"#d97706":C_MUT}}>{t("achievements")}</span>
          <span onClick={()=>nav("lostfound")}     style={{cursor:"pointer",color:page==="lostfound"?"#16a34a":C_MUT}}>{t("lostfound")}</span>
          <span onClick={()=>nav("search")}        style={{cursor:"pointer",color:page==="search"?"#0891b2":C_MUT}}>{t("search")}</span>
          <span onClick={()=>nav("contact")}       style={{cursor:"pointer",color:page==="contact"?"#2563eb":C_MUT}}>{t("queries")}</span>
          <span onClick={()=>nav("jobs")}  style={{cursor:"pointer",color:page==="jobs"?"#0891b2":C_MUT}}>💼 Jobs</span>
          <span onClick={()=>nav("forum")} style={{cursor:"pointer",color:page==="forum"?"#7c3aed":C_MUT}}>💬 Forum</span>
          <span onClick={()=>nav("cgpa")}  style={{cursor:"pointer",color:page==="cgpa"?"#16a34a":C_MUT}}>🎓 CGPA</span>
          <span onClick={()=>nav("poll")}  style={{cursor:"pointer",color:page==="poll"?"#d97706":C_MUT}}>📊 Poll</span>
          <span onClick={()=>nav("news")}  style={{cursor:"pointer",color:page==="news"?"#e11d48":C_MUT}}>📰 News</span>
          <span onClick={()=>nav("timer")} style={{cursor:"pointer",color:page==="timer"?"#0f766e":C_MUT}}>⏱️ Timer</span>
          <span onClick={()=>nav("alumni")} style={{cursor:"pointer",color:page==="alumni"?"#7c3aed":C_MUT}}>🎓 Alumni</span>
          <span onClick={()=>nav("projects")} style={{cursor:"pointer",color:page==="projects"?"#0891b2":C_MUT}}>🚀 Projects</span>
          <span onClick={()=>nav("resources")} style={{cursor:"pointer",color:page==="resources"?"#16a34a":C_MUT}}>📚 Resources</span>
          <span onClick={()=>nav("wagroups")} style={{cursor:"pointer",color:page==="wagroups"?"#25D366":C_MUT}}>💬 WA Groups</span>
          <span onClick={()=>nav("attendance")} style={{cursor:"pointer",color:page==="attendance"?"#f97316":C_MUT}}>📊 Attendance</span>
          {user && <span onClick={()=>nav("assignments")} style={{cursor:"pointer",color:page==="assignments"?"#ef4444":C_MUT}}>📝 Tasks</span>}
          {user && <span onClick={()=>nav("idcard")} style={{cursor:"pointer",color:page==="idcard"?"#e11d48":C_MUT}}>🪪 ID Card</span>}
          {user?.admin && <span onClick={()=>nav("admin")} style={{color:"#7c3aed",cursor:"pointer"}}>{t("dashboard")}</span>}
        </nav>
      </header>

      {/* Notice Ticker */}
      {data.notices && Object.values(data.notices).length > 0 && (
        <div style={{background:darkMode?"#2d2006":"#fffbeb",padding:"8px 0",overflow:"hidden",whiteSpace:"nowrap",borderBottom:`1px solid ${C_BDR}`,width:"100%"}}>
          <div style={{display:"inline-block",animation:"ticker 40s linear infinite",fontSize:"0.83rem",color:SEC,fontWeight:600}}>
            {Object.keys(data.notices).map(k => ` 🔥 [NOTICE] ${data.notices[k].text} `).join("     ⚡     ")}
          </div>
        </div>
      )}

      {/* Pages */}
      <div style={{padding:"2rem 1.1rem",maxWidth:1200,margin:"0 auto",width:"100%",overflow:"hidden"}}>
        {page==="home"         && <HomePage    data={data} nav={nav} settings={settings} gallery={gallery} achievements={achievements} exams={exams} db={db} user={user} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} g={gCl} sec={SEC}/>}
        {page==="events"       && <EventsPage  data={data} cat={cat} setCat={setCat} user={user} register={register} setModal={setModal} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} regs={regs}/>}
        {page==="notes"        && <NotesPage   notes={notes} db={db} storage={storage} user={user} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} lblS={lblS} inpS={inpS} Btn={Btn}/>}
        {page==="gallery"      && <GalleryPage gallery={gallery} db={db} storage={storage} user={user} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} inpS={inpS} Btn={Btn}/>}
        {page==="timetable"    && <TimetablePage timetable={timetable} db={db} storage={storage} user={user} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} inpS={inpS} lblS={lblS} Btn={Btn}/>}
        {page==="achievements" && <AchievementsPage achievements={achievements} db={db} user={user} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="lostfound"    && <LostFoundPage lostFound={lostFound} db={db} user={user} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} gCl={gCl} inpS={inpS} Btn={Btn}/>}
        {page==="search"       && <SearchPage  notes={notes} data={data} achievements={achievements} t={t} nav={nav} setCat={setCat} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} inpS={inpS}/>}
        {page==="contact"      && <ContactPage fbs={fbs} db={db} user={user} settings={settings} t={t} cCard={C_CARD} cBdr={C_BDR} inpS={inpS} p={P} Btn={Btn}/>}
        {page==="login"        && <LoginPage   loginUser={loginUser} nav={nav} users={users} t={t} cCard={C_CARD} cBdr={C_BDR} inpS={inpS} p={P} Btn={Btn}/>}
        {page==="signup"       && <SignupPage  loginUser={loginUser} nav={nav} users={users} db={db} t={t} cCard={C_CARD} cBdr={C_BDR} inpS={inpS} lblS={lblS} g={gCl} Btn={Btn}/>}
        {page==="profile"      && user && <ProfilePage user={user} regs={regs} data={data} nav={nav} t={t} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC}/>}
        {page==="jobs"   && <JobsPage  jobs={jobs}  db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} inpS={inpS} Btn={Btn}/>}
        {page==="forum"  && <ForumPage forum={forum} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="cgpa"   && <CGPAPage  cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="poll"   && <PollPage  polls={polls} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="news"        && <NewsPage       news={news} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn} storage={storage}/>}
        {page==="timer"       && <PomodoroPage   cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC}/>}
        {page==="alumni"      && <AlumniPage     alumni={alumni} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="projects"    && <ProjectsPage   projects={projects} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="resources"   && <ResourcesPage  resources={resources} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="wagroups"    && <WAGroupsPage   waGroups={waGroups} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="attendance"  && <AttendancePage cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="assignments" && user && <AssignmentsPage assignments={assignments} db={db} user={user} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P} sec={SEC} inpS={inpS} Btn={Btn}/>}
        {page==="idcard" && user && <IDCardPage user={user} settings={settings} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P}/>}
        {page==="admin"        && <AdminPage   data={data} users={users} fbs={fbs} regs={regs} notes={notes} gallery={gallery} timetable={timetable} achievements={achievements} lostFound={lostFound} exams={exams} db={db} storage={storage} settings={settings} t={t} cCard={C_CARD} cBdr={C_BDR} lblS={lblS} inpS={inpS} p={P} sec={SEC} g={gCl} Btn={Btn} cMut={C_MUT}/>}
      </div>

      {modal && <DetailModal item={modal} close={()=>setModal(null)} cCard={C_CARD} cBdr={C_BDR} cMut={C_MUT} p={P}/>}
    </div>
  );
}

// ── Home Page ─────────────────────────────────────────────────
function HomePage({data, nav, settings, gallery, achievements, exams, cCard, cBdr, cMut, p, g, sec, user}) {
  const fallbackImg = "https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=600&auto=format&fit=crop";
  const [now, setNow] = React.useState(new Date());
  React.useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id);},[]);
  const getDays = d => Math.ceil((new Date(d)-new Date())/864e5);
  const upcoming = (exams||[]).filter(e=>getDays(e.date)>=0).slice(0,3);
  const photos   = gallery.slice(0,5);
  const totalEv  = Object.values(data).reduce((a,c)=>a+Object.keys(c||{}).length,0);
  const timeStr  = now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const dateStr  = now.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
  const TILES = [
    {icon:"📄",label:"Notes",      page:"notes",       g:"linear-gradient(135deg,#1d4ed8,#60a5fa)"},
    {icon:"📸",label:"Gallery",    page:"gallery",     g:"linear-gradient(135deg,#be185d,#f472b6)"},
    {icon:"🗓️",label:"Timetable", page:"timetable",   g:"linear-gradient(135deg,#6d28d9,#a78bfa)"},
    {icon:"🏆",label:"Wins",       page:"achievements",g:"linear-gradient(135deg,#b45309,#fbbf24)"},
    {icon:"⚽",label:"Events",     page:"events",      g:"linear-gradient(135deg,#15803d,#4ade80)"},
    {icon:"💼",label:"Jobs",       page:"jobs",        g:"linear-gradient(135deg,#0e7490,#22d3ee)"},
    {icon:"💬",label:"Forum",      page:"forum",       g:"linear-gradient(135deg,#7c3aed,#c4b5fd)"},
    {icon:"🎓",label:"CGPA",       page:"cgpa",        g:"linear-gradient(135deg,#065f46,#6ee7b7)"},
    {icon:"📰",label:"News",       page:"news",        g:"linear-gradient(135deg,#be123c,#fb7185)"},
    {icon:"⏱️",label:"Timer",      page:"timer",       g:"linear-gradient(135deg,#0f766e,#5eead4)"},
    {icon:"🎓",label:"Alumni",     page:"alumni",      g:"linear-gradient(135deg,#6d28d9,#818cf8)"},
    {icon:"🚀",label:"Projects",   page:"projects",    g:"linear-gradient(135deg,#0369a1,#38bdf8)"},
    {icon:"📚",label:"Resources",  page:"resources",   g:"linear-gradient(135deg,#166534,#86efac)"},
    {icon:"💬",label:"WA Groups",  page:"wagroups",    g:"linear-gradient(135deg,#15803d,#4ade80)"},
    {icon:"📊",label:"Attendance", page:"attendance",  g:"linear-gradient(135deg,#c2410c,#fb923c)"},
    {icon:"📝",label:"Tasks",      page:"assignments", g:"linear-gradient(135deg,#9f1239,#fda4af)"},
    {icon:"🔍",label:"Lost+Found", page:"lostfound",   g:"linear-gradient(135deg,#0f766e,#5eead4)"},
    {icon:"🔎",label:"Search",     page:"search",      g:"linear-gradient(135deg,#1e40af,#93c5fd)"},
    {icon:"📊",label:"Poll",       page:"poll",        g:"linear-gradient(135deg,#a16207,#fde68a)"},
    {icon:"📬",label:"Queries",    page:"contact",     g:"linear-gradient(135deg,#374151,#9ca3af)"},
  ];
  return (
    <div style={{width:"100%"}}>

      {/* HERO */}
      <div style={{background:"linear-gradient(135deg,#020617,#0f172a 40%,#1e1b4b 70%,#1e3a8a)",borderRadius:22,overflow:"hidden",position:"relative",marginBottom:"1.4rem"}} className="slide-up">
        <div style={{position:"absolute",top:-70,right:-70,width:240,height:240,background:"radial-gradient(circle,rgba(99,102,241,0.22),transparent 70%)",borderRadius:"50%",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:-40,left:-40,width:180,height:180,background:"radial-gradient(circle,rgba(37,99,235,0.18),transparent 70%)",borderRadius:"50%",pointerEvents:"none"}}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:"1.5rem",padding:"2rem 1.8rem",position:"relative",zIndex:1,alignItems:"center"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,padding:"5px 11px",marginBottom:12,width:"fit-content"}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#4ade80",display:"inline-block",animation:"pulse 1.5s ease-in-out infinite"}}/>
              <span style={{color:"#94a3b8",fontSize:"0.67rem",fontFamily:"monospace"}}>{timeStr}</span>
              <span style={{color:"#475569",fontSize:"0.6rem"}}>· {dateStr}</span>
            </div>
            <div style={{background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:7,padding:"3px 11px",fontSize:"0.64rem",fontWeight:700,color:"#fbbf24",marginBottom:10,width:"fit-content",letterSpacing:"1px"}}>
              🎓 OFFICIAL BTU BIKANER PORTAL
            </div>
            <h1 style={{fontSize:"clamp(1.6rem,3.5vw,2.4rem)",fontWeight:800,lineHeight:1.15,color:"#fff"}}>
              Bikaner Technical<br/>
              <span style={{background:"linear-gradient(90deg,#fbbf24,#f97316)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>University Hub</span>
            </h1>
            <p style={{marginTop:10,color:"#94a3b8",fontSize:"0.84rem",lineHeight:1.7}}>Official digital portal — Notes, PYQs, Events, Gallery — sab ek jagah.</p>
            <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
              <button onClick={()=>nav("notes")} style={{background:"linear-gradient(135deg,#2563eb,#3b82f6)",color:"#fff",border:"none",padding:"10px 20px",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:"0.84rem",boxShadow:"0 4px 14px rgba(37,99,235,0.3)"}}>📄 Notes & PYQs</button>
              <button onClick={()=>nav("events")} style={{background:"rgba(255,255,255,0.07)",color:"#e2e8f0",border:"1px solid rgba(255,255,255,0.1)",padding:"10px 20px",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:"0.84rem"}}>Explore Events</button>
            </div>
            <div style={{display:"flex",gap:16,marginTop:16,flexWrap:"wrap"}}>
              {[["50+","Notes"],[gallery.length||0,"Photos"],[totalEv||0,"Events"],[achievements.length||0,"Wins"]].map((s,i)=>(
                <div key={i} style={{textAlign:"center"}}>
                  <div style={{fontWeight:800,fontSize:"1.1rem",color:"#fbbf24"}}>{s[0]}</div>
                  <div style={{fontSize:"0.58rem",color:"#64748b",fontWeight:600}}>{s[1]}</div>

        </div>

                <div key={ex.firebaseKey} style={{background:cCard,border:"2px solid "+col+"33",borderRadius:14,padding:"0.8rem",textAlign:"center"}} className="hov-card">
                  <div style={{fontSize:"2rem",fontWeight:900,color:col,lineHeight:1}}>{d===0?"🔥":d}</div>
                  <div style={{fontSize:"0.6rem",color:col,fontWeight:700,marginTop:2}}>{d===0?"TODAY!":"DAYS LEFT"}</div>
                  <div style={{fontWeight:700,marginTop:4,fontSize:"0.78rem"}}>{ex.name}</div>
                  <div style={{fontSize:"0.6rem",color:cMut,marginTop:2}}>{ex.date}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* QUICK ACCESS */}
      <div style={{marginBottom:"1.4rem"}}>
        <h2 style={{fontWeight:800,fontSize:"0.95rem",marginBottom:10}}>⚡ Quick Access</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:8}}>
          {TILES.map((tile,i)=>(
            <div key={i} onClick={()=>nav(tile.page)}

              className="hov-card">
              <div style={{fontSize:"1.35rem"}}>{tile.icon}</div>
              <div style={{fontWeight:700,fontSize:"0.6rem",color:"rgba(255,255,255,0.95)",marginTop:4,lineHeight:1.3}}>{tile.label}</div>
            </div>
          ))}
        </div>
      </div>

      {photos.length > 0 && (
        <div style={{marginBottom:"1.4rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h2 style={{fontWeight:800,fontSize:"0.95rem"}}>📸 Recent Photos</h2>
            <span onClick={()=>nav("gallery")} style={{color:p,fontWeight:700,cursor:"pointer",fontSize:"0.75rem"}}>All →</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gridTemplateRows:"120px 120px",gap:6}}>
            {photos.map((ph,i)=>(
              <div key={ph.firebaseKey||i} onClick={()=>nav("gallery")}
                style={{borderRadius:11,overflow:"hidden",cursor:"pointer",gridRow:i===0?"1 / 3":"auto"}}
                className="hov-card">
                <img src={ph.url} loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} alt=""/>
              </div>
            ))}
          </div>
        </div>

        <div style={{marginBottom:"1.4rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h2 style={{fontWeight:800,fontSize:"0.95rem"}}>🏆 Achievements</h2>

// ── Notes Page (FIX: Firebase Storage, not base64 RTDB) ───────
function NotesPage({notes, db, storage, user, cCard, cBdr, cMut, p, lblS, inpS, Btn}) {
  const [uploading,  setUploading]  = useState(false);
  const [progress,   setProgress]   = useState(0);
  const [noteName,   setNoteName]   = useState("");
  const [noteSubject,setNoteSubject]= useState("Engineering Mathematics");
  const [sel,        setSel]        = useState("All Materials");
  const [sc,         setSc]         = useState("");

  // FIX: Upload to Firebase Storage → store only download URL in RTDB
  const handleUpload = (e) => {
    const file = e.target.files[0];
    if (!file || !noteName.trim()) { alert("Title aur file dono zaroori hain!"); return; }
    if (file.size > 50*1024*1024) { alert("Max file size 50MB hai!"); return; }

    setUploading(true);
    setProgress(0);

    const storageRef  = storage.ref(`portal_notes/${Date.now()}_${file.name}`);
    const uploadTask  = storageRef.put(file);

    uploadTask.on('state_changed',
      snap => setProgress(Math.round(snap.bytesTransferred / snap.totalBytes * 100)),
      err  => { setUploading(false); setProgress(0); alert("Upload failed: " + err.message); },
      ()   => {
        uploadTask.snapshot.ref.getDownloadURL().then(url => {
          db.ref("portal_notes").push({
            id: Date.now(), name: noteName, subject: noteSubject,
            fileName: file.name,
            size: (file.size / (1024*1024)).toFixed(2) + "MB",
            url: url,   // ← Only URL stored, not base64
            date: new Date().toLocaleDateString("en-IN")
          }, err2 => {
            setUploading(false); setProgress(0);
            if (err2) { alert("DB push failed: " + err2.message); }
            else { setNoteName(""); e.target.value = ""; alert("✅ File uploaded successfully!"); }
          });
        });
      }
    );
  };

  // FIX: Handle both old base64 notes and new URL-based notes
  const downloadNote = (note) => {
    if (note.url) {
      window.open(note.url, '_blank');
    } else if (note.data) {
      const a = document.createElement("a"); a.href = note.data; a.download = note.fileName; a.click();
    }
  };

  const filtered = notes.filter(n =>
    (sel === "All Materials" || n.subject === sel) &&
    (n.name?.toLowerCase().includes(sc.toLowerCase()))
  );

  return (
    <div style={{width:"100%"}} className="fade-in">
      {/* Admin Upload Panel */}
      {user?.admin && (
        <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.5rem",marginBottom:"2rem",width:"100%"}}>
          <h4 style={{fontWeight:800,marginBottom:12}}>📤 Upload Study Material (Max 50MB)</h4>
          <input style={inpS} placeholder="Material Title" value={noteName} onChange={e=>setNoteName(e.target.value)}/>
          <select style={inpS} value={noteSubject} onChange={e=>setNoteSubject(e.target.value)}>
            {SUBJECT_FILTERS.slice(1).map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <input type="file" onChange={handleUpload} disabled={uploading} style={{display:"block",marginTop:4}}/>
          {uploading && (
            <div style={{marginTop:10}}>
              <p style={{color:p,fontWeight:600,fontSize:"0.85rem"}}>Uploading... {progress}%</p>
              <div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}/></div>
            </div>
          )}
        </div>
      )}

      {/* Filters */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:"1rem",width:"100%"}}>
        {SUBJECT_FILTERS.map(b => (
          <button key={b} onClick={()=>setSel(b)}
            style={{padding:"6px 12px",background:sel===b?p:cCard,color:sel===b?"#fff":cMut,
                    border:`1px solid ${cBdr}`,borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:"0.8rem"}}>
            {b}
          </button>
        ))}
      </div>
      <input style={inpS} placeholder="🔍 Search materials..." value={sc} onChange={e=>setSc(e.target.value)}/>

      {/* Cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,width:"100%"}}>
        {filtered.length === 0 && <div style={{color:cMut,fontSize:"0.85rem",gridColumn:"1/-1"}}>Koi material nahi mila.</div>}
        {filtered.map(note => (
          <div key={note.firebaseKey||note.id} style={{background:cCard,border:`1px solid ${cBdr}`,padding:"1rem",borderRadius:12}} className="hov-card">
            <div style={{fontSize:"1.6rem",marginBottom:6}}>📄</div>
            <h4 style={{fontWeight:800,fontSize:"0.9rem"}}>{note.name}</h4>
            <div style={{fontSize:"0.7rem",color:p,fontWeight:700,marginTop:4}}>{note.subject}</div>
            {/* FIX: Date and size now both displayed */}
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:cMut,marginTop:8}}>
              <span>📅 {note.date || "—"}</span>
              <span>💾 {note.size}</span>
            </div>
            <button onClick={()=>downloadNote(note)}
              style={{marginTop:10,width:"100%",background:p,color:"#fff",border:"none",borderRadius:8,padding:"8px",fontWeight:700,cursor:"pointer",fontSize:"0.8rem"}}>
              ⬇ Download
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Login Page (FIX: Async SHA-256 hash comparison) ───────────
function LoginPage({loginUser, nav, users, cCard, cBdr, inpS, p, Btn}) {
  const [r,  setR]  = useState("");
  const [ps, setPs] = useState("");
  const [loading, setLoading] = useState(false);

  const go = async () => {
    if (!r.trim() || !ps) return;
    setLoading(true);
    const inputRoll = r.trim().toUpperCase();
    const inputHash = await hashPass(ps);

    if (inputRoll === "ADMIN" && inputHash === DEFAULT_ADMIN_HASH) {
      loginUser({admin:true, name:"University Master Admin"});
      nav("home");
    } else {
      const u = users.find(x => x.roll === inputRoll && x.pass === inputHash);
      if (u) { loginUser(u); nav("home"); }
      else   { alert("Invalid credentials!"); }
    }
    setLoading(false);
  };

  return (
    <div style={{maxWidth:400,margin:"4rem auto",background:cCard,border:`1px solid ${cBdr}`,padding:"2rem",borderRadius:16,width:"100%"}} className="fade-in">
      <h3 style={{fontWeight:800,marginBottom:20}}>🔐 Sign In</h3>
      <input style={inpS} placeholder="Roll Number" value={r} onChange={e=>setR(e.target.value)}/>
      <input type="password" style={inpS} placeholder="Password" value={ps} onChange={e=>setPs(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&go()}/>
      <button onClick={go} disabled={loading} style={{...Btn(p),width:"100%",opacity:loading?0.7:1}}>
        {loading ? "Verifying..." : "Sign In"}
      </button>
      <p style={{marginTop:14,fontSize:"0.8rem",textAlign:"center",opacity:0.6}}>
        Account nahi hai? <span onClick={()=>nav("signup")} style={{color:p,cursor:"pointer",fontWeight:700}}>Join Portal →</span>
      </p>
    </div>
  );
}

// ── Signup Page (FIX: Async hash + db as prop) ────────────────
function SignupPage({loginUser, nav, users, db, cCard, cBdr, inpS, lblS, g, Btn}) {
  const [f, setF] = useState({name:"",roll:"",branch:"",pass:""});
  const [loading, setLoading] = useState(false);

  const go = async () => {
    const r = f.roll.replace(/\s+/g,'').toUpperCase();
    if (!f.name || !r || !f.pass) { alert("Sabhi fields fill karo!"); return; }
    if (f.pass.length < 6) { alert("Password kam se kam 6 characters ka hona chahiye!"); return; }
    if (users.find(x => x.roll === r)) { alert("Ye Roll Number already registered hai!"); return; }
    setLoading(true);

    // FIX 3: Hash password before storing
    const hashedPass = await hashPass(f.pass);
    const nu = {
      id: Date.now(), name: f.name, roll: r,
      branch: f.branch, pass: hashedPass,
      date: new Date().toLocaleDateString("en-IN")
    };
    db.ref("portal_users").push(nu);
    loginUser(nu);
    nav("home");
    setLoading(false);
  };

  return (
    <div style={{maxWidth:400,margin:"4rem auto",background:cCard,border:`1px solid ${cBdr}`,padding:"2rem",borderRadius:16,width:"100%"}} className="fade-in">
      <h3 style={{fontWeight:800,marginBottom:20}}>📝 Join Portal</h3>
      <input style={inpS} placeholder="Full Name" value={f.name}   onChange={e=>setF({...f,name:e.target.value})}/>
      <input style={inpS} placeholder="Roll Number" value={f.roll} onChange={e=>setF({...f,roll:e.target.value})}/>
      <input style={inpS} placeholder="Branch (e.g. CSE, ECE)" value={f.branch} onChange={e=>setF({...f,branch:e.target.value})}/>
      <input type="password" style={inpS} placeholder="Password (min 6 chars)" value={f.pass} onChange={e=>setF({...f,pass:e.target.value})}/>
      <button onClick={go} disabled={loading} style={{...Btn(g),width:"100%",opacity:loading?0.7:1}}>
        {loading ? "Creating..." : "Create Account"}
      </button>
    </div>
  );
}

    return {catKey, item};
  };

  return (
    <div style={{width:"100%"}} className="fade-in">
      {/* Profile Card */}

          {user.name?.charAt(0)?.toUpperCase()}

        <div>
          <h2 style={{fontWeight:800,fontSize:"1.3rem"}}>{user.name}</h2>
          <p style={{color:p,fontWeight:700,marginTop:2}}>🎓 {user.roll}</p>
          <p style={{color:cMut,fontSize:"0.82rem",marginTop:2}}>{user.branch || "Branch N/A"} · Joined {user.date}</p>

        <div style={{marginLeft:"auto",background:"rgba(37,99,235,0.07)",borderRadius:12,padding:"12px 20px",textAlign:"center"}}>
          <div style={{fontWeight:800,fontSize:"1.4rem",color:p}}>{myEventKeys.length}</div>
          <div style={{fontSize:"0.72rem",color:cMut,fontWeight:600}}>Events Enrolled</div>

// ── Global Search Page ────────────────────────────────────────
function SearchPage({notes, data, achievements, t, nav, setCat, cCard, cBdr, cMut, p, inpS}) {
  const [query, setQuery] = useState("");

  const q = query.toLowerCase().trim();

  const results = q.length < 2 ? [] : [
    ...notes.filter(n => n.name?.toLowerCase().includes(q) || n.subject?.toLowerCase().includes(q))
      .map(n => ({type:"note", icon:"📄", title:n.name, sub:n.subject, action:()=>nav("notes")})),
    ...Object.entries(data).flatMap(([cat, items]) =>
      Object.values(items||{}).filter(i => i.title?.toLowerCase().includes(q) || i.desc?.toLowerCase().includes(q))
        .map(i => ({type:"event", icon:"🏛️", title:i.title, sub:cat.toUpperCase(), action:()=>{setCat(cat);nav("events");}}))
    ),
    ...achievements.filter(a => a.title?.toLowerCase().includes(q) || a.student?.toLowerCase().includes(q))
      .map(a => ({type:"achievement", icon:"🏆", title:a.title, sub:a.student, action:()=>nav("achievements")})),
  ];

  return (
    <div style={{maxWidth:640,margin:"0 auto",width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:16}}>{t("globalSearch")}</h2>
      <div style={{position:"relative",marginBottom:"1.5rem"}}>
        <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:"1.1rem"}}>🔎</span>
        <input style={{...inpS,paddingLeft:40,fontSize:"1rem",marginBottom:0,border:`2px solid ${p}33`}}
          placeholder={t("searchPlaceholder")} value={query} onChange={e=>setQuery(e.target.value)} autoFocus/>
      </div>

      {q.length >= 2 && (
        <>
          <p style={{color:cMut,fontSize:"0.8rem",marginBottom:10}}>{t("searchResults")}: <strong>{results.length}</strong></p>
          {results.length===0
            ? <div style={{textAlign:"center",padding:"3rem",color:cMut}}><div style={{fontSize:"3rem"}}>🔍</div><p style={{marginTop:8}}>{t("noResults")}</p></div>
            : results.map((r,i)=>(
                <div key={i} onClick={r.action}
                  style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:12,padding:"0.9rem 1.1rem",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}} className="hov-card">
                  <span style={{fontSize:"1.4rem",flexShrink:0}}>{r.icon}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:"0.9rem"}}>{r.title}</div>
                    <div style={{fontSize:"0.72rem",color:p,fontWeight:600,marginTop:2}}>{r.sub}</div>
                  </div>
                  <span style={{marginLeft:"auto",color:cMut,fontSize:"0.8rem"}}>→</span>
                </div>
              ))
          }
        </>
      )}
      {q.length < 2 && q.length > 0 && <p style={{color:cMut,fontSize:"0.82rem",textAlign:"center"}}>2 ya zyada characters likho...</p>}
    </div>
  );
}

// ── Gallery Page ──────────────────────────────────────────────
function GalleryPage({gallery, db, storage, user, cCard, cBdr, cMut, p, inpS, Btn}) {
  const [caption, setCaption]     = useState("");
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress]   = useState(0);
  const [lightbox, setLightbox]   = useState(null);

  const handlePhotoUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (file.size > 10*1024*1024) { alert("Photo 10MB se chhoti honi chahiye!"); return; }
    setUploading(true); setProgress(0);
    const ref = storage.ref(`portal_gallery/${Date.now()}_${file.name}`);
    const task = ref.put(file);
    task.on('state_changed',
      snap => setProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100)),
      err  => { setUploading(false); alert("Upload failed: "+err.message); },
      ()   => task.snapshot.ref.getDownloadURL().then(url => {
        db.ref("portal_gallery").push({url, caption:caption||"BTU Campus", date:new Date().toLocaleDateString("en-IN"), uploader:user?.name||"Admin"});
        setCaption(""); setUploading(false); setProgress(0); e.target.value="";
        alert("✅ Photo uploaded!");
      })
    );
  };

  return (
    <div style={{width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:16}}>📸 Campus Photo Gallery</h2>

      {user?.admin && (
        <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.5rem",marginBottom:"1.5rem"}}>
          <h4 style={{fontWeight:700,marginBottom:12}}>📤 Upload College Photo (max 10MB)</h4>
          <input style={inpS} placeholder="Caption (e.g. Farewell 2025, Lab Session...)" value={caption} onChange={e=>setCaption(e.target.value)}/>
          <input type="file" accept="image/*" onChange={handlePhotoUpload} disabled={uploading}/>
          {uploading && <><p style={{color:p,fontSize:"0.82rem",marginTop:6,fontWeight:600}}>Uploading... {progress}%</p>
            <div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}/></div></>}
        </div>
      )}

      {gallery.length === 0
        ? <div style={{textAlign:"center",color:cMut,padding:"3rem"}}>Abhi koi photo nahi hai. Admin se add karwao! 📷</div>
        : <div style={{columns:"2 160px",gap:10}}>
            {gallery.map(ph => (
              <div key={ph.firebaseKey} onClick={()=>setLightbox(ph)}
                style={{breakInside:"avoid",marginBottom:10,borderRadius:12,overflow:"hidden",cursor:"pointer",background:cCard,border:`1px solid ${cBdr}`}}
                className="hov-card">
                <img src={ph.url} style={{width:"100%",display:"block"}} alt={ph.caption}/>
                <div style={{padding:"6px 10px",fontSize:"0.7rem",color:cMut}}>
                  <span style={{fontWeight:600}}>{ph.caption}</span>
                  <span style={{float:"right"}}>{ph.date}</span>
                </div>
                {user?.admin && (
                  <div style={{padding:"0 10px 8px",textAlign:"right"}}>
                    <span onClick={ev=>{ev.stopPropagation();if(confirm("Delete this photo?"))db.ref(`portal_gallery/${ph.firebaseKey}`).remove();}}
                      style={{color:"#ef4444",fontSize:"0.7rem",fontWeight:700,cursor:"pointer"}}>Delete 🗑️</span>
                  </div>
                )}
              </div>
            ))}
          </div>
      }

      {/* Lightbox */}
      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <img src={lightbox.url} style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:12,objectFit:"contain"}} alt=""/>
          <p style={{color:"#fff",marginTop:12,fontWeight:600}}>{lightbox.caption}</p>
          <p style={{color:"#94a3b8",fontSize:"0.75rem"}}>{lightbox.date} · {lightbox.uploader}</p>
          <button onClick={()=>setLightbox(null)} style={{marginTop:16,padding:"8px 20px",background:"#ef4444",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>✕ Close</button>
        </div>
      )}
    </div>
  );
}

const BRANCHES = ["CSE","ECE","ME","CE","EE","IT","MBA","MCA"];
const SEMESTERS = ["1st Sem","2nd Sem","3rd Sem","4th Sem","5th Sem","6th Sem","7th Sem","8th Sem"];

function TimetablePage({timetable, db, storage, user, cCard, cBdr, cMut, p, inpS, lblS, Btn}) {
  const [selBranch, setSelBranch] = useState("CSE");
  const [selSem,    setSelSem]    = useState("1st Sem");
  const [uploading, setUploading] = useState(false);
  const [lightbox,  setLightbox]  = useState(null);

  const key = `${selBranch}_${selSem}`.replace(/ /g,"_");
  const entry = timetable[key];

  const handleUpload = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (file.size > 10*1024*1024) { alert("File 10MB se chhoti honi chahiye!"); return; }
    setUploading(true);
    try {
      const ref = storage.ref(`portal_timetable/${key}_${Date.now()}_${file.name}`);
      await ref.put(file);
      const url = await ref.getDownloadURL();
      await db.ref(`portal_timetable/${key}`).set({url, fileName:file.name, date:new Date().toLocaleDateString("en-IN"), isImage: file.type.startsWith("image/")});
      alert("✅ Timetable uploaded!");
    } catch(err) { alert("Upload failed: "+err.message); }
    setUploading(false); e.target.value="";
  };

  return (
    <div style={{width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:16}}>🗓️ Class Timetable</h2>

      {/* Branch + Sem selector */}
      <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.2rem",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          {BRANCHES.map(b => (
            <button key={b} onClick={()=>setSelBranch(b)}
              style={{padding:"6px 14px",background:selBranch===b?p:"transparent",color:selBranch===b?"#fff":cMut,border:`1px solid ${cBdr}`,borderRadius:8,fontWeight:700,cursor:"pointer"}}>
              {b}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {SEMESTERS.map(s => (
            <button key={s} onClick={()=>setSelSem(s)}
              style={{padding:"6px 14px",background:selSem===s?"#7c3aed":"transparent",color:selSem===s?"#fff":cMut,border:`1px solid ${cBdr}`,borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:"0.8rem"}}>
              {s}
            </button>
          ))}
        </div>
      </div>

      {/* Admin upload */}
      {user?.admin && (
        <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:12,padding:"1rem",marginBottom:"1.5rem"}}>
          <h4 style={{fontWeight:700,marginBottom:8}}>📤 Upload Timetable — {selBranch} {selSem}</h4>
          <input type="file" accept="image/*,application/pdf" onChange={handleUpload} disabled={uploading}/>
          {uploading && <p style={{color:p,fontSize:"0.82rem",marginTop:6,fontWeight:600}}>Uploading...</p>}
          {entry && (
            <button onClick={()=>{if(confirm("Delete this timetable?"))db.ref(`portal_timetable/${key}`).remove();}}
              style={{marginTop:10,...Btn("#ef4444"),fontSize:"0.75rem",padding:"6px 14px"}}>Delete Current 🗑️</button>
          )}
        </div>
      )}

      {/* Timetable display */}
      <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.5rem",minHeight:200,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
        <h3 style={{fontWeight:700,marginBottom:12,textAlign:"center"}}>{selBranch} — {selSem}</h3>
        {!entry
          ? <div style={{textAlign:"center",color:cMut}}><div style={{fontSize:"2.5rem"}}>🗓️</div><p style={{marginTop:8}}>Abhi timetable upload nahi hua.<br/>{user?.admin?"Admin panel se upload karo.":"Admin se request karo."}</p></div>
          : entry.isImage
            ? <img src={entry.url} style={{maxWidth:"100%",borderRadius:10,cursor:"zoom-in"}} alt="Timetable" onClick={()=>setLightbox(entry.url)}/>
            : <a href={entry.url} target="_blank" style={{...Btn(p),textDecoration:"none",textAlign:"center"}}>📄 Timetable PDF Download / View</a>
        }
        {entry && <p style={{color:cMut,fontSize:"0.72rem",marginTop:10}}>Updated: {entry.date}</p>}
      </div>

      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <img src={lightbox} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:10}} alt="Timetable"/>
        </div>
      )}
    </div>
  );
}

// ── Exam Form Helper ──────────────────────────────────────────
function ExamForm({db, inpS, Btn, p}) {
  const [name, setName]     = useState("");
  const [date, setDate]     = useState("");
  const [subject, setSubject] = useState("");
  const submit = () => {
    if (!name.trim() || !date) { alert("Exam naam aur date zaroori hai!"); return; }
    db.ref("portal_exams").push({name, date, subject, createdAt: Date.now()});
    setName(""); setDate(""); setSubject("");
    alert("✅ Exam countdown added!");
  };
  return (
    <div>
      <input style={inpS} placeholder="Exam Name (e.g. End Semester Exam)" value={name} onChange={e=>setName(e.target.value)}/>
      <input style={inpS} placeholder="Subject (optional)" value={subject} onChange={e=>setSubject(e.target.value)}/>
      <input type="date" style={inpS} value={date} onChange={e=>setDate(e.target.value)}/>
      <button onClick={submit} style={Btn(p)}>➕ Add Exam Countdown</button>
    </div>
  );
}

// ── Forum Page ────────────────────────────────────────────────
function ForumPage({forum, db, user, cCard, cBdr, cMut, p, sec, inpS, Btn}) {
  const [question, setQuestion] = React.useState("");
  const [tag, setTag]           = React.useState("General");
  const [replyTo, setReplyTo]   = React.useState(null);
  const [replyText, setReplyText] = React.useState("");
  const TAGS = ["General","Academic","Technical","Career","Events","Other"];
  const postQ = () => {
    if(!question.trim())return;
    if(!user){alert("Login karo!");return;}
    db.ref("portal_forum").push({question,tag,author:user.name,roll:user.roll,date:new Date().toLocaleDateString("en-IN")});
    setQuestion(""); alert("Posted!");
  };
  const postReply = (key) => {
    if(!replyText.trim()||!user)return;
    db.ref(`portal_forum/${key}/replies`).push({text:replyText,author:user.name,date:new Date().toLocaleDateString("en-IN")});
    setReplyText(""); setReplyTo(null);
  };
  return (
    <div style={{width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:4}}>💬 Student Forum</h2>
      <p style={{color:cMut,fontSize:"0.82rem",marginBottom:16}}>Sawaal pucho, jawab pao!</p>
      <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.2rem",marginBottom:"1.5rem"}}>
        <textarea style={{...inpS,minHeight:70}} placeholder={user?"Sawaal likho...":"Login karke pucho!"} value={question} onChange={e=>setQuestion(e.target.value)} disabled={!user}/>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          {TAGS.map(tg=><button key={tg} onClick={()=>setTag(tg)} style={{padding:"4px 10px",background:tag===tg?p:"transparent",color:tag===tg?"#fff":cMut,border:`1px solid ${cBdr}`,borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:"0.75rem"}}>{tg}</button>)}
        </div>
        <button onClick={postQ} disabled={!user} style={{...Btn(p),opacity:user?1:0.5}}>Ask 🙋</button>
      </div>
      {forum.length===0
        ? <div style={{textAlign:"center",color:cMut,padding:"3rem"}}><div style={{fontSize:"3rem"}}>💬</div><p style={{marginTop:8}}>Pehla sawaal tum pucho!</p></div>
        : forum.map(q=>{
            const replies=q.replies?Object.keys(q.replies).map(k=>({...q.replies[k],key:k})):[];
            return (
              <div key={q.firebaseKey} style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.2rem",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <span style={{background:"rgba(124,58,237,0.08)",color:"#7c3aed",padding:"3px 10px",borderRadius:6,fontSize:"0.7rem",fontWeight:700}}>{q.tag}</span>
                  <span style={{fontSize:"0.68rem",color:cMut}}>{q.author} · {q.date}</span>
                </div>
                <p style={{fontWeight:700,fontSize:"0.92rem",marginTop:8}}>{q.question}</p>
                {replies.length>0 && (
                  <div style={{marginTop:10,borderLeft:"3px solid rgba(37,99,235,0.2)",paddingLeft:12}}>
                    {replies.map(r=>(
                      <div key={r.key} style={{marginBottom:8,fontSize:"0.82rem"}}>
                        <span style={{fontWeight:700,color:p}}>{r.author}</span>
                        <span style={{fontSize:"0.68rem",color:cMut,marginLeft:6}}>{r.date}</span>
                        <p style={{marginTop:2}}>{r.text}</p>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{marginTop:10,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:"0.72rem",color:cMut}}>💬 {replies.length}</span>
                  {user && (replyTo===q.firebaseKey
                    ? <div style={{display:"flex",gap:8,width:"100%",marginTop:6}}>
                        <input style={{...inpS,marginBottom:0,flex:1,fontSize:"0.82rem",padding:"8px 12px"}} placeholder="Jawab..." value={replyText} onChange={e=>setReplyText(e.target.value)}/>
                        <button onClick={()=>postReply(q.firebaseKey)} style={{...Btn(p),padding:"8px 12px"}}>Send</button>
                        <button onClick={()=>{setReplyTo(null);setReplyText("");}} style={{...Btn("#94a3b8"),padding:"8px 10px"}}>✕</button>
                      </div>
                    : <button onClick={()=>setReplyTo(q.firebaseKey)} style={{...Btn("transparent"),color:p,border:`1px solid ${p}`,fontSize:"0.75rem",padding:"5px 12px"}}>Reply</button>
                  )}

// ── CGPA Calculator ───────────────────────────────────────────
function CGPAPage({cCard, cBdr, cMut, p, sec, inpS, Btn}) {
  const GM = {"O":10,"A+":9,"A":8,"B+":7,"B":6,"C":5,"D":4,"F":0};
  const [subs, setSubs] = React.useState([{n:"Maths",c:"4",g:"O"},{n:"Physics",c:"3",g:"A+"},{n:"Programming",c:"3",g:"A"}]);
  const [result, setResult] = React.useState(null);
  const upd=(i,k,v)=>{const s=[...subs];s[i]={...s[i],[k]:v};setSubs(s);};
  const calc=()=>{
    let pts=0,crs=0;
    subs.forEach(s=>{const c=parseFloat(s.c)||0;pts+=c*(GM[s.g]??0);crs+=c;});
    if(!crs)return;
    const cgpa=(pts/crs).toFixed(2);
    const gr=cgpa>=9?"O":cgpa>=8?"A+":cgpa>=7?"A":cgpa>=6?"B+":cgpa>=5?"B":cgpa>=4?"C":"F";
    const msg=cgpa>=9?"🏆 Topper!":cgpa>=8?"🥇 Excellent!":cgpa>=7?"👍 Good!":cgpa>=6?"📚 Improve karo!":"⚠️ Mehnat karo!";
    setResult({cgpa,pct:((cgpa-0.5)*10).toFixed(1),crs,gr,msg});
  };
  return (
    <div style={{maxWidth:640,margin:"0 auto",width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:4}}>🎓 CGPA Calculator</h2>
      <p style={{color:cMut,fontSize:"0.82rem",marginBottom:16}}>O=10, A+=9, A=8, B+=7, B=6, C=5, D=4, F=0</p>
      <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.2rem",marginBottom:"1rem"}}>
        {subs.map((s,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 70px 85px 34px",gap:8,marginBottom:8,alignItems:"center"}}>
            <input style={{...inpS,marginBottom:0,fontSize:"0.82rem",padding:"8px 10px"}} placeholder={"Subject "+(i+1)} value={s.n} onChange={e=>upd(i,"n",e.target.value)}/>
            <input style={{...inpS,marginBottom:0,fontSize:"0.82rem",padding:"8px",textAlign:"center"}} type="number" min="1" max="6" value={s.c} onChange={e=>upd(i,"c",e.target.value)}/>
            <select style={{...inpS,marginBottom:0,fontSize:"0.82rem",padding:"8px"}} value={s.g} onChange={e=>upd(i,"g",e.target.value)}>
              {Object.keys(GM).map(g=><option key={g}>{g}</option>)}
            </select>
            <button onClick={()=>{const s=[...subs];s.splice(i,1);setSubs(s);}} style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,color:"#ef4444",fontWeight:800,cursor:"pointer",padding:"8px"}}>✕</button>
          </div>
        ))}
        <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
          <button onClick={()=>setSubs([...subs,{n:"",c:"3",g:"O"}])} style={{...Btn("transparent"),border:`1px dashed ${p}`,color:p}}>+ Subject</button>
          <button onClick={calc} style={Btn(p)}>Calculate →</button>
        </div>
      </div>
      {result && (
        <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a8a)",borderRadius:20,padding:"2rem",textAlign:"center",color:"#fff"}} className="slide-up">
          <div style={{fontSize:"0.8rem",opacity:0.7}}>Your CGPA</div>
          <div style={{fontSize:"4rem",fontWeight:800,color:"#fbbf24",lineHeight:1}}>{result.cgpa}</div>
          <div style={{marginTop:6,fontWeight:700}}>Grade: {result.gr} · {result.pct}% · {result.crs} Credits</div>
          <div style={{marginTop:10,fontSize:"0.85rem",opacity:0.8}}>{result.msg}</div>
        </div>
      )}
    </div>
  );
}

// ── Poll Page ─────────────────────────────────────────────────
function PollPage({polls, db, user, cCard, cBdr, cMut, p, sec, inpS, Btn}) {
  const [question, setQuestion] = React.useState("");
  const [options, setOptions]   = React.useState(["","",""]);
  const create=()=>{
    if(!question.trim())return;
    const valid=options.filter(o=>o.trim());
    if(valid.length<2){alert("Min 2 options!");return;}
    const opts={};
    valid.forEach((o,i)=>{opts["o"+i]={text:o,votes:[]};});
    db.ref("portal_polls").push({question,options:opts,date:new Date().toLocaleDateString("en-IN"),by:user?.name||"Admin"});
    setQuestion(""); setOptions(["","",""]); alert("Poll created!");
  };
  const doVote=(pollKey,optKey)=>{
    if(!user){alert("Login karo!");return;}
    const poll=polls.find(pl=>pl.firebaseKey===pollKey); if(!poll)return;
    const already=Object.values(poll.options||{}).some(o=>(o.votes||[]).includes(user.id));
    if(already){alert("Already voted!");return;}
    const ex=poll.options[optKey]?.votes||[];
    db.ref("portal_polls/"+pollKey+"/options/"+optKey+"/votes").set([...ex,user.id]);
  };
  return (
    <div style={{maxWidth:620,margin:"0 auto",width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:4}}>📊 Student Poll</h2>
      <p style={{color:cMut,fontSize:"0.82rem",marginBottom:16}}>Apni awaaz do!</p>
      {user?.admin && (
        <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.2rem",marginBottom:"1.5rem"}}>
          <input style={inpS} placeholder="Poll question..." value={question} onChange={e=>setQuestion(e.target.value)}/>
          {options.map((o,i)=><input key={i} style={inpS} placeholder={"Option "+(i+1)} value={o} onChange={e=>{const opts=[...options];opts[i]=e.target.value;setOptions(opts);}}/>)}
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>setOptions([...options,""])} style={{...Btn("transparent"),border:`1px dashed ${p}`,color:p,fontSize:"0.8rem"}}>+ Option</button>
            <button onClick={create} style={Btn(p)}>Create Poll</button>
          </div>
        </div>
      )}
      {polls.length===0
        ? <div style={{textAlign:"center",color:cMut,padding:"3rem"}}><div style={{fontSize:"3rem"}}>📊</div><p style={{marginTop:8}}>Koi poll nahi hai.</p></div>
        : polls.map(poll=>{
            const opts=poll.options?Object.entries(poll.options):[];
            const total=opts.reduce((a,kv)=>a+(kv[1].votes||[]).length,0);
            const voted=user&&opts.some(kv=>(kv[1].votes||[]).includes(user.id));
            return (
              <div key={poll.firebaseKey} style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.2rem",marginBottom:14}}>
                <h3 style={{fontWeight:800,fontSize:"0.95rem"}}>{poll.question}</h3>
                <p style={{fontSize:"0.68rem",color:cMut,marginTop:4}}>{poll.by} · {poll.date} · {total} votes</p>
                <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
                  {opts.map(kv=>{
                    const vc=(kv[1].votes||[]).length;
                    const pct=total>0?Math.round(vc/total*100):0;
                    return (
                      <div key={kv[0]} onClick={()=>!voted&&doVote(poll.firebaseKey,kv[0])}
                        style={{border:`1px solid ${cBdr}`,borderRadius:10,padding:"10px 14px",cursor:voted?"default":"pointer",position:"relative",overflow:"hidden"}}>
                        <div style={{position:"absolute",top:0,left:0,height:"100%",width:pct+"%",background:"rgba(37,99,235,0.1)",borderRadius:10,transition:"width 0.5s"}}/>
                        <div style={{position:"relative",display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontWeight:600,fontSize:"0.85rem"}}>{kv[1].text}</span>
                          <span style={{fontWeight:800,color:p}}>{pct}%</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {!user && <p style={{fontSize:"0.72rem",color:cMut,marginTop:8,textAlign:"center"}}>Login karo to vote.</p>}
                {user?.admin && <span onClick={()=>{if(confirm("Delete?"))db.ref("portal_polls/"+poll.firebaseKey).remove();}} style={{display:"block",textAlign:"right",color:"#ef4444",fontSize:"0.72rem",fontWeight:700,cursor:"pointer",marginTop:8}}>🗑️ Delete</span>}
              </div>
            );
          })
      }
    </div>
  );
}

// ── ⏱️ Pomodoro Study Timer ────────────────────────────────────
function PomodoroPage({cCard, cBdr, cMut, p, sec}) {
  const MODES = [{label:"🍅 Focus",min:25},{label:"☕ Short Break",min:5},{label:"🌙 Long Break",min:15}];
  const [mode,    setMode]    = useState(0);
  const [secs,    setSecs]    = useState(25*60);
  const [running, setRunning] = useState(false);
  const [sessions,setSessions]= useState(0);
  const [task,    setTask]    = useState("");
  const [tasks,   setTasks]   = useState([]);

  useEffect(()=>{setSecs(MODES[mode].min*60); setRunning(false);},[mode]);
  useEffect(()=>{
    if(!running) return;
    const id = setInterval(()=>{
      setSecs(s=>{
        if(s<=1){ setRunning(false); if(mode===0)setSessions(n=>n+1); return MODES[mode].min*60; }
        return s-1;
      });
    },1000);
    return ()=>clearInterval(id);
  },[running,mode]);

  const mm = String(Math.floor(secs/60)).padStart(2,'0');
  const ss = String(secs%60).padStart(2,'0');
  const pct= (1 - secs/(MODES[mode].min*60))*100;
  const col = mode===0?"#ef4444":mode===1?"#16a34a":"#7c3aed";

  return (
    <div style={{maxWidth:440,margin:"0 auto",width:"100%",textAlign:"center"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:16}}>⏱️ Pomodoro Study Timer</h2>
      <div style={{display:"flex",gap:8,marginBottom:20,justifyContent:"center",flexWrap:"wrap"}}>
        {MODES.map((m,i)=>(
          <button key={i} onClick={()=>setMode(i)} style={{padding:"7px 16px",background:mode===i?col:"transparent",color:mode===i?"#fff":cMut,border:`2px solid ${mode===i?col:cBdr}`,borderRadius:20,fontWeight:700,cursor:"pointer",fontSize:"0.8rem",transition:"all 0.2s"}}>{m.label}</button>
        ))}
      </div>
      <div style={{background:cCard,border:`3px solid ${col}`,borderRadius:"50%",width:220,height:220,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",position:"relative",boxShadow:`0 0 30px ${col}33`,animation:running?"glow-card":"none"}}>
        <svg style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}} width="220" height="220">
          <circle cx="110" cy="110" r="105" fill="none" stroke={`${col}22`} strokeWidth="6"/>
          <circle cx="110" cy="110" r="105" fill="none" stroke={col} strokeWidth="6" strokeDasharray={2*Math.PI*105} strokeDashoffset={2*Math.PI*105*(1-pct/100)} style={{transition:"stroke-dashoffset 0.5s"}}/>
        </svg>
        <div style={{fontSize:"3.5rem",fontWeight:900,fontFamily:"monospace",color:col,lineHeight:1}}>{mm}:{ss}</div>
        <div style={{fontSize:"0.75rem",color:cMut,marginTop:4}}>{MODES[mode].label}</div>
      </div>
      <div style={{display:"flex",gap:12,marginTop:24,justifyContent:"center"}}>
        <button onClick={()=>setRunning(r=>!r)} style={{background:col,color:"#fff",border:"none",padding:"12px 32px",borderRadius:12,fontWeight:800,cursor:"pointer",fontSize:"1rem",boxShadow:`0 4px 14px ${col}44`}}>
          {running?"⏸ Pause":"▶ Start"}
        </button>
        <button onClick={()=>{setRunning(false);setSecs(MODES[mode].min*60);}} style={{background:cCard,color:cMut,border:`1px solid ${cBdr}`,padding:"12px 20px",borderRadius:12,fontWeight:700,cursor:"pointer"}}>↺ Reset</button>
      </div>
      <div style={{marginTop:16,display:"flex",gap:16,justifyContent:"center"}}>
        <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:12,padding:"10px 20px",textAlign:"center"}}>
          <div style={{fontWeight:800,fontSize:"1.4rem",color:col}}>{sessions}</div>
          <div style={{fontSize:"0.7rem",color:cMut}}>Sessions Done</div>
        </div>
        <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:12,padding:"10px 20px",textAlign:"center"}}>
          <div style={{fontWeight:800,fontSize:"1.4rem",color:"#16a34a"}}>{sessions*25}m</div>
          <div style={{fontSize:"0.7rem",color:cMut}}>Total Focus</div>
        </div>
      </div>
      <div style={{marginTop:20,background:cCard,border:`1px solid ${cBdr}`,borderRadius:14,padding:"1rem",textAlign:"left"}}>
        <h4 style={{fontWeight:700,marginBottom:8}}>📝 Session Tasks</h4>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input style={{flex:1,padding:"7px 12px",borderRadius:8,border:`1px solid ${cBdr}`,fontSize:"0.82rem",background:"transparent",color:"inherit"}} placeholder="Add a task..." value={task} onChange={e=>setTask(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&task.trim()){setTasks([...tasks,{text:task,done:false}]);setTask("");}}}/>
          <button onClick={()=>{if(task.trim()){setTasks([...tasks,{text:task,done:false}]);setTask("");}}} style={{background:p,color:"#fff",border:"none",padding:"7px 14px",borderRadius:8,fontWeight:700,cursor:"pointer"}}>+</button>
        </div>
        {tasks.length===0 && <p style={{color:cMut,fontSize:"0.78rem"}}>Koi task nahi. Upar add karo!</p>}
        {tasks.map((t,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${cBdr}`}}>
            <input type="checkbox" checked={t.done} onChange={()=>{const ts=[...tasks];ts[i].done=!ts[i].done;setTasks(ts);}} style={{cursor:"pointer",width:16,height:16}}/>
            <span style={{fontSize:"0.82rem",flex:1,textDecoration:t.done?"line-through":"none",opacity:t.done?0.5:1}}>{t.text}</span>
            <span onClick={()=>{const ts=[...tasks];ts.splice(i,1);setTasks(ts);}} style={{color:"#ef4444",cursor:"pointer",fontSize:"0.75rem"}}>✕</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 📊 Attendance Calculator ──────────────────────────────────
function AttendancePage({cCard, cBdr, cMut, p, sec, inpS, Btn}) {
  const [subjects, setSubjects] = useState([
    {name:"Mathematics",total:"60",attended:"50"},{name:"Physics",total:"55",attended:"44"},{name:"Programming",total:"50",attended:"40"},
  ]);
  const [minPct, setMinPct] = useState("75");
  const upd=(i,k,v)=>{const s=[...subjects];s[i]={...s[i],[k]:v};setSubjects(s);};
  const getPct=(s)=>{ const t=parseInt(s.total)||0,a=parseInt(s.attended)||0; return t>0?(a/t*100).toFixed(1):0; };
  const getBunks=(s)=>{ const t=parseInt(s.total)||0,a=parseInt(s.attended)||0,m=parseFloat(minPct)||75; const safe=Math.floor(a-(m/100)*t); return safe>0?safe:0; };
  const getNeedMore=(s)=>{ const t=parseInt(s.total)||0,a=parseInt(s.attended)||0,m=parseFloat(minPct)||75; const need=Math.ceil((m*t/100-a)/(1-m/100)); return need>0?need:0; };
  const overallPct=()=>{ const tot=subjects.reduce((a,s)=>a+(parseInt(s.total)||0),0),att=subjects.reduce((a,s)=>a+(parseInt(s.attended)||0),0); return tot>0?(att/tot*100).toFixed(1):0; };
  return (
    <div style={{maxWidth:680,margin:"0 auto",width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:4}}>📊 Attendance Calculator</h2>
      <p style={{color:cMut,fontSize:"0.82rem",marginBottom:16}}>Kitne bunks safe hain — pata karo!</p>
      <div style={{display:"flex",alignItems:"center",gap:12,background:cCard,border:`1px solid ${cBdr}`,borderRadius:12,padding:"12px 16px",marginBottom:16}}>
        <span style={{fontWeight:700,fontSize:"0.85rem",whiteSpace:"nowrap"}}>Minimum Required:</span>
        <input type="number" style={{...inpS,marginBottom:0,width:80,textAlign:"center"}} value={minPct} onChange={e=>setMinPct(e.target.value)}/>
        <span style={{fontWeight:700}}>%</span>
      </div>
      <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"0.8rem 1rem",background:`${p}10`,borderBottom:`1px solid ${cBdr}`,display:"grid",gridTemplateColumns:"2fr 80px 80px",gap:8,fontSize:"0.72rem",fontWeight:700,color:cMut}}>
          <span>Subject</span><span style={{textAlign:"center"}}>Total</span><span style={{textAlign:"center"}}>Attended</span>
        </div>
        {subjects.map((s,i)=>{
          const pct=getPct(s); const col=pct>=parseFloat(minPct)?"#16a34a":"#ef4444";
          return (
            <div key={i} style={{padding:"0.8rem 1rem",borderBottom:`1px solid ${cBdr}`,display:"grid",gridTemplateColumns:"2fr 80px 80px",gap:8,alignItems:"center"}}>
              <input style={{...inpS,marginBottom:0,fontSize:"0.82rem",padding:"6px 10px"}} value={s.name} onChange={e=>upd(i,"name",e.target.value)}/>
              <input type="number" style={{...inpS,marginBottom:0,fontSize:"0.82rem",padding:"6px",textAlign:"center"}} value={s.total} onChange={e=>upd(i,"total",e.target.value)}/>
              <input type="number" style={{...inpS,marginBottom:0,fontSize:"0.82rem",padding:"6px",textAlign:"center"}} value={s.attended} onChange={e=>upd(i,"attended",e.target.value)}/>
              <div style={{gridColumn:"1/-1",display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:4}}>
                <div style={{flex:1,background:`${col}22`,borderRadius:6,height:6,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:col,borderRadius:6,transition:"width 0.4s"}}/>
                </div>
                <span style={{color:col,fontWeight:800,fontSize:"0.8rem",marginLeft:10,whiteSpace:"nowrap"}}>{pct}%</span>
                <span style={{fontSize:"0.72rem",color:pct>=parseFloat(minPct)?"#16a34a":"#ef4444",marginLeft:10,whiteSpace:"nowrap"}}>
                  {pct>=parseFloat(minPct)?`✅ ${getBunks(s)} bunks safe`:`⚠️ ${getNeedMore(s)} classes chahiye`}
                </span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={()=>setSubjects([...subjects,{name:"New Subject",total:"50",attended:"40"}])} style={{...Btn("transparent"),border:`1px dashed ${p}`,color:p}}>+ Add Subject</button>
        <button onClick={()=>{const s=[...subjects];s.pop();setSubjects(s);}} style={{...Btn("transparent"),border:`1px solid ${cBdr}`,color:cMut}}>- Remove Last</button>
      </div>
      <div style={{background:`linear-gradient(135deg,${p},#7c3aed)`,borderRadius:16,padding:"1.5rem",color:"#fff",textAlign:"center"}}>
        <div style={{fontSize:"0.82rem",opacity:0.8}}>Overall Attendance</div>
        <div style={{fontSize:"3.5rem",fontWeight:900,lineHeight:1}}>{overallPct()}%</div>
        <div style={{marginTop:6,fontSize:"0.85rem",opacity:0.9}}>
          {parseFloat(overallPct())>=parseFloat(minPct) ? "✅ Safe! Keep it up." : "⚠️ Danger zone! Classes attend karo."}
        </div>
      </div>
    </div>
  );
}

// ── 📝 Assignment Tracker ─────────────────────────────────────
function AssignmentsPage({assignments, db, user, cCard, cBdr, cMut, p, sec, inpS, Btn}) {
  const [f, setF] = useState({title:"",subject:"",due:"",priority:"Medium",notes:""});
  const PRIORITIES = [{v:"High",c:"#ef4444"},{v:"Medium",c:"#f97316"},{v:"Low",c:"#16a34a"}];
  const myAssignments = assignments.filter(a=>a.userId===user.id);
  const getDays=d=>{const diff=Math.ceil((new Date(d)-new Date())/864e5);return diff;};
  const add=()=>{
    if(!f.title||!f.due) return;
    db.ref("portal_assignments").push({...f,userId:user.id,userName:user.name,roll:user.roll,done:false,createdAt:Date.now()});
    setF({title:"",subject:"",due:"",priority:"Medium",notes:""}); alert("✅ Task added!");
  };
  const toggleDone=(key,done)=>db.ref(`portal_assignments/${key}/done`).set(!done);
  return (
    <div style={{maxWidth:640,margin:"0 auto",width:"100%"}} className="fade-in">
      <h2 style={{fontWeight:800,fontSize:"1.3rem",marginBottom:4}}>📝 Assignment Tracker</h2>
      <p style={{color:cMut,fontSize:"0.82rem",marginBottom:16}}>Apni assignments track karo — koi miss na ho!</p>
      <div style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:16,padding:"1.2rem",marginBottom:"1.5rem"}}>
        <input style={inpS} placeholder="Assignment / Task *" value={f.title} onChange={e=>setF({...f,title:e.target.value})}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <input style={{...inpS,marginBottom:0}} placeholder="Subject" value={f.subject} onChange={e=>setF({...f,subject:e.target.value})}/>
          <input type="date" style={{...inpS,marginBottom:0}} value={f.due} onChange={e=>setF({...f,due:e.target.value})}/>
        </div>
        <textarea style={{...inpS,minHeight:50,marginTop:8}} placeholder="Notes (optional)..." value={f.notes} onChange={e=>setF({...f,notes:e.target.value})}/>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
          {PRIORITIES.map(pr=><button key={pr.v} onClick={()=>setF({...f,priority:pr.v})} style={{padding:"5px 14px",background:f.priority===pr.v?pr.c:"transparent",color:f.priority===pr.v?"#fff":cMut,border:`1px solid ${f.priority===pr.v?pr.c:cBdr}`,borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:"0.8rem"}}>{pr.v}</button>)}
        </div>
        <button onClick={add} style={Btn(p)}>Add Assignment</button>
      </div>
      {myAssignments.length===0
        ? <div style={{textAlign:"center",color:cMut,padding:"3rem"}}><div style={{fontSize:"3rem"}}>📝</div><p style={{marginTop:8}}>Koi assignment nahi hai. Enjoy karo! 🎉</p></div>
        : (()=>{
            const pending=myAssignments.filter(a=>!a.done).sort((a,b)=>new Date(a.due)-new Date(b.due));
            const done=myAssignments.filter(a=>a.done);
            return (
              <>
                {pending.length>0 && <>
                  <h3 style={{fontWeight:800,marginBottom:10}}>⏳ Pending ({pending.length})</h3>
                  {pending.map(a=>{
                    const d=getDays(a.due);
                    const pc=PRIORITIES.find(pr=>pr.v===a.priority);
                    return (
                      <div key={a.firebaseKey} style={{background:cCard,border:`2px solid ${d<=1?"#ef4444":d<=3?"#f97316":cBdr}`,borderRadius:14,padding:"1rem",marginBottom:10,display:"flex",gap:12,alignItems:"flex-start"}}>
                        <input type="checkbox" checked={false} onChange={()=>toggleDone(a.firebaseKey,a.done)} style={{width:18,height:18,cursor:"pointer",marginTop:3,flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
                            <h4 style={{fontWeight:800,fontSize:"0.9rem"}}>{a.title}</h4>
                            <span style={{background:`${pc?.c||p}15`,color:pc?.c||p,padding:"2px 8px",borderRadius:6,fontSize:"0.68rem",fontWeight:700}}>{a.priority}</span>
                          </div>
                          {a.subject && <div style={{fontSize:"0.75rem",color:p,marginTop:3}}>📚 {a.subject}</div>}
                          {a.notes && <p style={{fontSize:"0.74rem",color:cMut,marginTop:4}}>{a.notes}</p>}
                          <div style={{marginTop:6,fontSize:"0.72rem",color:d<=1?"#ef4444":d<=3?"#f97316":cMut,fontWeight:700}}>
                            {d<0?"🚨 Overdue!":d===0?"🔥 Due Today!":d===1?"⚠️ Due Tomorrow":"📅 Due: "+a.due+" ("+d+" days)"}
                          </div>
                        </div>
                        <span onClick={()=>{if(confirm("Delete?"))db.ref(`portal_assignments/${a.firebaseKey}`).remove();}} style={{color:"#ef4444",cursor:"pointer",fontSize:"0.8rem",fontWeight:700,flexShrink:0}}>🗑️</span>
                      </div>
                    );
                  })}
                </>}
                {done.length>0 && <>
                  <h3 style={{fontWeight:800,marginBottom:10,marginTop:16}}>✅ Completed ({done.length})</h3>
                  {done.map(a=>(
                    <div key={a.firebaseKey} style={{background:cCard,border:`1px solid ${cBdr}`,borderRadius:14,padding:"1rem",marginBottom:8,display:"flex",gap:12,alignItems:"center",opacity:0.65}}>
                      <input type="checkbox" checked={true} onChange={()=>toggleDone(a.firebaseKey,a.done)} style={{width:18,height:18,cursor:"pointer",flexShrink:0}}/>
                      <div style={{flex:1}}>
                        <span style={{textDecoration:"line-through",fontSize:"0.88rem",fontWeight:600}}>{a.title}</span>
                        {a.subject && <span style={{fontSize:"0.72rem",color:cMut,marginLeft:8}}>{a.subject}</span>}
                      </div>
                      <span onClick={()=>{if(confirm("Delete?"))db.ref(`portal_assignments/${a.firebaseKey}`).remove();}} style={{color:"#ef4444",cursor:"pointer",fontSize:"0.8rem",fontWeight:700}}>🗑️</span>
                    </div>
                  ))}
                </>}
              </>
            );
          })()
      }
    </div>
  );
}


function IPill({icon, label, val}) {
  return (
    <div style={{padding:"8px 12px",background:"rgba(0,0,0,0.04)",borderRadius:8,width:"100%"}}>
      <span style={{marginRight:6}}>{icon}</span>
      <span style={{fontSize:"0.74rem",fontWeight:600,display:"block",color:"gray"}}>{label}</span>
      <span style={{fontSize:"0.84rem",fontWeight:700}}>{val}</span>
    </div>
  );
}

function DetailModal({item, close, cCard, cBdr, cMut, p}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.65)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem",backdropFilter:"blur(4px)"}}
      onClick={close}>
      <div style={{background:cCard,padding:"1.8rem",borderRadius:20,maxWidth:500,width:"100%",boxShadow:"0 20px 40px rgba(0,0,0,0.2)"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <h2 style={{fontSize:"1.1rem",fontWeight:800}}>{item.emoji} {item.title}</h2>
          <button onClick={close} style={{background:"none",border:"none",fontSize:"1.1rem",cursor:"pointer",color:cMut}}>✕</button>
        </div>
        {item.photo && (
          <div style={{width:"100%",height:165,borderRadius:10,overflow:"hidden",marginTop:10}}>
            <img src={item.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
          </div>
        )}
        <p style={{color:cMut,marginTop:10,fontSize:"0.88rem",lineHeight:1.6}}>{item.desc}</p>
        {item.videoUrl && (
          <div style={{marginTop:10,fontSize:"0.8rem",fontWeight:700,background:"rgba(37,99,235,0.06)",padding:10,borderRadius:8}}>
            🔗 Video: <a href={item.videoUrl} target="_blank" style={{color:p,wordBreak:"break-all"}}>{item.videoUrl}</a>
          </div>
        )}
        <div style={{marginTop:12,fontSize:"0.8rem",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8}}>
          <IPill icon="📍" label="Venue" val={item.venue    || "UCET Campus"}/>
          <IPill icon="👨‍💼" label="Organizer" val={item.organizer || "University Board"}/>
        </div>
      </div>
    </div>
  );
}

// ── Render ────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
